# Railway Deployment Workflow
#
# Automatically deploys apps/engine and apps/agents to Railway on push to main.
# Only triggers when files in those service directories actually change,
# so web-only changes won't cause unnecessary Railway deploys.
#
# Deployment is gated on CI passing — the ci-gate job polls the CI workflow
# for up to 20 minutes before allowing any deploy jobs to start.

name: Railway Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/engine/**'
      - 'apps/agents/**'
      - 'packages/shared/**'

permissions:
  contents: read
  actions: read

concurrency:
  group: railway-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  RAILWAY_CLI_VERSION: 3.12.0

jobs:
  # ---------------------------------------------------------------------------
  # Gate: wait for the CI workflow to pass before deploying anything
  # ---------------------------------------------------------------------------
  ci-gate:
    name: Wait for CI
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Wait for CI workflow to pass
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          MAX_ATTEMPTS=40

          echo "Waiting for CI to complete on commit ${SHA:0:7}..."

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            RESULT=$(gh api "repos/${REPO}/actions/workflows/ci.yml/runs?head_sha=${SHA}&per_page=1" \
              --jq '.workflow_runs[0] | "\(.status) \(.conclusion // "pending")"' 2>/dev/null || echo "unknown unknown")
            STATUS=$(echo "$RESULT" | cut -d' ' -f1)
            CONCLUSION=$(echo "$RESULT" | cut -d' ' -f2)

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "✅ CI passed for commit ${SHA:0:7}"
                exit 0
              else
                echo "❌ CI concluded with '${CONCLUSION}' for commit ${SHA:0:7} — blocking deployment"
                exit 1
              fi
            fi

            echo "⏳ CI status: ${STATUS} (attempt ${attempt}/${MAX_ATTEMPTS}), waiting 30s..."
            sleep 30
          done

          echo "❌ CI did not complete within 20 minutes — blocking deployment"
          exit 1

  changes:
    name: Detect Changes
    needs: ci-gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      engine: ${{ steps.filter.outputs.engine }}
      agents: ${{ steps.filter.outputs.agents }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            engine:
              - 'apps/engine/**'
              - 'packages/shared/**'
            agents:
              - 'apps/agents/**'
              - 'packages/shared/**'

  deploy-engine:
    name: Deploy Engine
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate required production secrets (engine)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_ENGINE_SERVICE_ID: ${{ secrets.RAILWAY_ENGINE_SERVICE_ID }}
          RAILWAY_ENGINE_URL: ${{ secrets.RAILWAY_ENGINE_URL }}
        run: |
          set -euo pipefail
          required=(RAILWAY_TOKEN RAILWAY_ENGINE_SERVICE_ID RAILWAY_ENGINE_URL)
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "❌ Missing required production secret: $key"
              exit 1
            fi
          done

      - name: Install Railway CLI
        run: npm install -g "@railway/cli@${RAILWAY_CLI_VERSION}"

      - name: Deploy engine service
        working-directory: apps/engine
        run: |
          railway up \
            --service "${{ secrets.RAILWAY_ENGINE_SERVICE_ID }}" \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Health check
        env:
          ENGINE_URL: ${{ secrets.RAILWAY_ENGINE_URL }}
        run: |
          set -euo pipefail
          echo "Checking engine health at ${ENGINE_URL}/health ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${ENGINE_URL}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Engine is healthy (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i — got HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ Engine health check failed after 5 attempts"
          exit 1

  deploy-agents:
    name: Deploy Agents
    needs: changes
    if: needs.changes.outputs.agents == 'true'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate required production secrets (agents)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_AGENTS_SERVICE_ID: ${{ secrets.RAILWAY_AGENTS_SERVICE_ID }}
          RAILWAY_AGENTS_URL: ${{ secrets.RAILWAY_AGENTS_URL }}
        run: |
          set -euo pipefail
          required=(RAILWAY_TOKEN RAILWAY_AGENTS_SERVICE_ID RAILWAY_AGENTS_URL)
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "❌ Missing required production secret: $key"
              exit 1
            fi
          done

      - name: Install Railway CLI
        run: npm install -g "@railway/cli@${RAILWAY_CLI_VERSION}"

      - name: Deploy agents service
        run: |
          railway up \
            --service "${{ secrets.RAILWAY_AGENTS_SERVICE_ID }}" \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Health check
        env:
          AGENTS_URL: ${{ secrets.RAILWAY_AGENTS_URL }}
        run: |
          set -euo pipefail
          echo "Checking agents health at ${AGENTS_URL}/health ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${AGENTS_URL}/health" || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Agents service is healthy (attempt $i)"
              exit 0
            fi
            echo "⏳ Attempt $i — got HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ Agents health check failed after 5 attempts"
          exit 1

  verify-web-proxy:
    name: Verify Web Proxy Endpoints
    needs: [changes, deploy-engine, deploy-agents]
    if: always() && (needs.changes.outputs.engine == 'true' || needs.changes.outputs.agents == 'true')
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Validate required production secret (web URL)
        env:
          VERCEL_PRODUCTION_URL: ${{ secrets.VERCEL_PRODUCTION_URL }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_PRODUCTION_URL:-}" ]; then
            echo "❌ Missing required production secret: VERCEL_PRODUCTION_URL"
            exit 1
          fi

      - name: Verify upstream deploy jobs succeeded
        run: |
          set -euo pipefail
          if [ "${{ needs.deploy-engine.result }}" = "failure" ] || [ "${{ needs.deploy-agents.result }}" = "failure" ]; then
            echo "❌ Upstream Railway deploy job failed; skipping proxy checks by failing the release gate."
            exit 1
          fi

      - name: Run synthetic proxy probes
        env:
          BASE_URL: ${{ secrets.VERCEL_PRODUCTION_URL }}
        run: |
          set -euo pipefail
          base="${BASE_URL%/}"
          endpoints=(
            "/api/engine/health"
            "/api/agents/health"
            "/api/agents/status"
            "/api/settings/status"
          )

          for endpoint in "${endpoints[@]}"; do
            url="${base}${endpoint}"
            echo "🔎 Probing ${url}"
            status=$(curl -sS -o /tmp/proxy-response.json -w "%{http_code}" "$url")
            if [ "$status" != "200" ]; then
              echo "❌ ${endpoint} returned HTTP ${status}"
              cat /tmp/proxy-response.json
              exit 1
            fi
            echo "✅ ${endpoint} returned HTTP 200"
          done
