name: Supabase Type Generation

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  pull_request:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

concurrency:
  group: supabase-typegen-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  typegen:
    name: Generate database types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      # persist-credentials is intentionally kept (default true): the
      # auto-commit step pushes regenerated types back to main.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2  # zizmor: ignore[artipacked]

      - uses: supabase/setup-cli@df56b21da46c98abb12a9804e4fb1f657773e333 # v2.0.0
        with:
          version: 2.48.3

      - name: Generate types
        if: ${{ env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_PROJECT_REF != '' }}
        run: |
          supabase gen types --lang=typescript \
            --project-id "$SUPABASE_PROJECT_REF" \
            --schema public \
            > packages/shared/src/types/database.types.ts

      - name: Warn if secrets unavailable
        if: ${{ env.SUPABASE_ACCESS_TOKEN == '' || env.SUPABASE_PROJECT_REF == '' }}
        run: |
          echo "::warning::Supabase secrets not available (fork PR or missing config). Skipping type generation."

      - name: Check for type drift
        if: ${{ env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_PROJECT_REF != '' }}
        id: diff
        run: |
          if git diff --quiet packages/shared/src/types/database.types.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "### 📋 Database type drift detected"
              echo '```diff'
              git diff packages/shared/src/types/database.types.ts | head -100
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Auto-commit updated types (push to main only)
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/shared/src/types/database.types.ts
          git commit -m "chore: regenerate database types from migrations"
          git push

      - name: Warn on PR if types are stale
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'pull_request'
        run: |
          echo "::warning::database.types.ts is out of sync with migrations. Types will auto-update on merge to main."
