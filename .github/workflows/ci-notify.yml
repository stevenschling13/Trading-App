# CI Failure Notification Workflow
#
# Automatically creates a GitHub issue when the CI workflow fails,
# so failures are visible and trackable outside the Actions tab.
#
# workflow_run is used intentionally here: this workflow runs in the
# *base* repo context (not the fork), so it can safely write issues.
# It does not check out code from the triggering run, so there is no
# code-execution attack surface. zizmor: ignore[dangerous-triggers]

name: CI Failure Notification

on: # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows: ['CI']
    types:
      - completed

permissions:
  issues: write
  actions: read

jobs:
  sync-default-branch-ci-issue:
    name: Sync Default Branch CI Issue
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      issues: write
    steps:
      - name: Create, update, or close CI issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = context.payload.workflow_run;
            const defaultBranch = context.payload.repository.default_branch;
            const isDefaultBranchPush =
              run.head_branch === defaultBranch && run.event === 'push';

            if (!isDefaultBranchPush) {
              core.info(
                `Skipping CI issue sync for ${run.event} on ${run.head_branch}; only ${defaultBranch} push runs open issues.`,
              );
              return;
            }

            const runUrl = run.html_url;
            const branch = defaultBranch;
            const sha = run.head_sha.substring(0, 7);
            const fullSha = run.head_sha;
            const actor = run.actor?.login || 'unknown';
            const commitUrl = `${context.payload.repository.html_url}/commit/${fullSha}`;
            const timestamp = new Date(run.updated_at).toISOString();
            const title = `🔴 CI is failing on \`${branch}\``;
            const marker = '<!-- ci-failure-issue:default-branch -->';
            const body = [
              marker,
              `## CI Failure Report`,
              ``,
              `| Detail | Value |`,
              `|--------|-------|`,
              `| **Workflow** | [${run.name} #${run.run_number}](${runUrl}) |`,
              `| **Branch** | \`${branch}\` |`,
              `| **Commit** | [\`${sha}\`](${commitUrl}) |`,
              `| **Triggered by** | @${actor} |`,
              `| **Failed at** | ${timestamp} |`,
              `| **Conclusion** | \`${run.conclusion}\` |`,
              ``,
              `### Next Steps`,
              `1. Review the [workflow run logs](${runUrl}) for details`,
              `2. Fix the failing step and push a new commit`,
              `3. The issue will close automatically after the next green ${branch} CI run`,
              ``,
              `---`,
              `*This issue is kept as a single rolling record for default-branch CI failures.*`,
            ].join('\n');

            // Ensure labels exist (create if missing)
            for (const label of ['ci-failure', 'automated']) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                });
              } catch {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: label === 'ci-failure' ? 'D73A4A' : '0E8A16',
                  description: label === 'ci-failure'
                    ? 'Automated issue for CI pipeline failures'
                    : 'Created by an automated workflow',
                });
              }
            }

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure,automated',
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.body?.includes(marker));

            if (run.conclusion === 'failure') {
              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  title,
                  body,
                });

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body: `CI is still failing on \`${branch}\`. Latest run: [${run.name} #${run.run_number}](${runUrl}) at ${timestamp}.`,
                });

                core.info(`Updated existing CI failure issue #${existing.number}.`);
                return;
              }

              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure', 'automated'],
              });

              core.info(`Created CI failure issue #${created.data.number}.`);
              return;
            }

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `CI recovered on \`${branch}\` with [${run.name} #${run.run_number}](${runUrl}) at ${timestamp}. Closing this issue automatically.`,
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              });

              core.info(`Closed recovered CI failure issue #${existing.number}.`);
              return;
            }

            core.info(`CI concluded with ${run.conclusion}; no open default-branch failure issue to sync.`);
